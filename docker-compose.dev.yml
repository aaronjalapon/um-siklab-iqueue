# =============================================================================
# IQueue — Development Overrides
# =============================================================================
# Usage:
#   COMPOSE_BAKE=true docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# This file overrides the production config for local development:
#   - Hot reload for backend (volume-mounted code)
#   - Exposed PostgreSQL port
#   - Debug mode enabled
# =============================================================================

services:
  # --- PostgreSQL (dev: exposed port) ---
  postgres:
    # Inherits postgres:18-alpine from base compose file
    ports:
      - "5432:5432"

  # --- FastAPI Backend (dev: hot reload, volume mounts) ---
  backend:
    build:
      target: runtime-base  # lightweight dev image; skips optional ML deps
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./ml:/app/ml
    environment:
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8000
    command: >
      sh -c "(alembic upgrade head || true) &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"

  # --- Next.js Frontend (dev: hot reload, volume mounts) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev:docker
    volumes:
      - ./frontend:/app
      - /app/node_modules  # anonymous volume to preserve node_modules
      # Do NOT mount /app/.next — it caused read-only FS errors with Turbopack.
      # distDir is redirected to /tmp/iqueue-next when DOCKER=1 (see next.config.ts).
    environment:
      - DOCKER=1
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - WATCHPACK_POLLING=true  # for macOS file watching inside Docker
    ports:
      - "3000:3000"
